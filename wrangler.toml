name = "generals-bot"
main = "src/index.ts"
compatibility_date = "2026-06-14"
workers_dev = true

[observability]
enabled = true

# Optional tuning for paid Workers plans or private deployments.
# These are read by the Worker from env vars, not secrets.
[vars]
GENERALS_BASE_URL = "https://generals.io"
COUNT_PER_PAGE = "200"
PLAYER_MAX_PAGES = "10"
RECENT_MAX_PAGES = "8"
RECENT_PROFILE_LIMIT = "36"
PAGE_BATCH_SIZE = "4"
PROFILE_BATCH_SIZE = "5"
